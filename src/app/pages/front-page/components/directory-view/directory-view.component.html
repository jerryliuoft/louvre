<div class="padding-container">
  @for (entry of currentPage(); track entry) {
    <div class="flex-container align-items-center space-between">
      <app-directory-chips [path]="entry[0]"></app-directory-chips>
      <button
        mat-icon-button
        class="delete-folder-btn"
        matTooltip="Delete this folder"
        (click)="deleteFolder(entry[0])"
      >
        <mat-icon>delete_outline</mat-icon>
      </button>
    </div>
    <div class="flex-container gap-md flex-wrap">
      @for (file of getMediaPreview(entry[1]); track file.path) {
        <app-media-container [file]="file"></app-media-container>
      }
    </div>
    @if (getOthers(entry[1]).length > 0) {
      <div class="others-section">
        <div class="section-header flex-container align-items-center gap-sm">
          <mat-icon>insert_drive_file</mat-icon>
          <span>Other Files ({{ getOthers(entry[1]).length }})</span>
        </div>
        <div class="flex-container gap-md flex-wrap">
          @for (file of getOthers(entry[1]); track file.path) {
            <app-generic-file-item [file]="file"></app-generic-file-item>
          }
        </div>
      </div>
    }
  } @empty {
    <app-empty-state></app-empty-state>
  }
</div>
